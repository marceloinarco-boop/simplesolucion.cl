{% extends 'base.html' %}
{% block title %}Generador LRE{% endblock %}
{% block content %}
<h1>Generador LRE</h1>
<div class="card">
  <p>Sube el archivo de Previred (Excel) y el de liquidaciones, indica el periodo, y descarga el CSV listo para subir a la Dirección del Trabajo.</p>
  <form method="POST" enctype="multipart/form-data">
    <label>Archivo Previred (.xlsx)</label>
    <input type="file" name="archivo_previred" accept=".xlsx,.xls" required>

    <label>Archivo Liquidaciones (.xlsx)</label>
    <input type="file" name="archivo_liquidaciones" accept=".xlsx,.xls" required>

    <div class="grid2">
      <div>
        <label>Mes (MM)</label>
        <input type="text" name="mes" placeholder="07" maxlength="2" required>
      </div>
      <div>
        <label>Año (AAAA)</label>
        <input type="text" name="anio" placeholder="2026" maxlength="4" required>
      </div>
    </div>

    <button type="submit">Generar y descargar CSV</button>
  </form>
</div>
{% endblock %}
