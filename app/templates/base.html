<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Herramientas{% endblock %}</title>
<style>
  :root { --azul:#003087; --rojo:#C8102E; --gris:#F2F4F7; --texto:#1A1A2E; --ok:#2E7D32; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; background:var(--gris); color:var(--texto); margin:0; }
  header { background:var(--azul); color:#fff; padding:12px 24px; display:flex; justify-content:space-between; align-items:center; }
  header .brand { display:flex; align-items:center; gap:10px; }
  header .brand img { height:38px; width:38px; border-radius:8px; object-fit:cover; }
  header a { color:#fff; text-decoration:none; font-weight:600; }
  main { max-width:900px; margin:32px auto; padding:0 16px; }
  .card { background:#fff; border-radius:10px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,.08); margin-bottom:20px; }
  h1,h2 { margin-top:0; }
  label { display:block; margin:12px 0 4px; font-weight:600; font-size:14px; }
  input, select { width:100%; padding:9px 10px; border:1px solid #cfd6e4; border-radius:6px; font-size:14px; }
  input[type=checkbox] { width:auto; }
  button, .btn { background:var(--azul); color:#fff; border:none; padding:10px 18px; border-radius:6px; font-size:14px; cursor:pointer; text-decoration:none; display:inline-block; margin-top:16px; }
  button:hover, .btn:hover { opacity:.9; }
  .btn-secondary { background:#555; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:0 16px; }
  .flash { padding:10px 14px; border-radius:6px; margin-bottom:12px; font-size:14px; }
  .flash.error { background:#fdecea; color:var(--rojo); }
  .flash.success { background:#e8f5e9; color:var(--ok); }
  table { width:100%; border-collapse:collapse; margin-top:12px; }
  td, th { padding:6px 8px; border-bottom:1px solid #eee; font-size:14px; text-align:left; }
  .tool-list { list-style:none; padding:0; }
  .tool-list li { margin-bottom:12px; }
  .tool-list a { display:block; background:#fff; padding:18px; border-radius:10px; text-decoration:none; color:var(--texto); box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .tool-list a:hover { box-shadow:0 2px 8px rgba(0,0,0,.15); }
  .tool-list small { color:#666; }
</style>
</head>
<body>
<header>
  <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('auth.login') }}" class="brand">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Simple Solución">
    <span>Simple Solución</span>
  </a>
  {% if current_user.is_authenticated %}
  <span>{{ current_user.nombre }} &nbsp;|&nbsp; <a href="{{ url_for('auth.logout') }}">Cerrar sesión</a></span>
  {% endif %}
</header>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="flash {{ category }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
