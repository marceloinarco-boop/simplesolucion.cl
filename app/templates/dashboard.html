{% extends 'base.html' %}
{% block title %}Panel de Herramientas{% endblock %}
{% block content %}
<h1>Herramientas disponibles</h1>
<ul class="tool-list">
  {% for h in herramientas %}
  <li>
    <a href="{{ url_for(h.url) }}">
      <div class="icon">{{ h.icono }}</div>
      <div>
        <strong>{{ h.nombre }}</strong><br>
        <small>{{ h.descripcion }}</small>
      </div>
    </a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
