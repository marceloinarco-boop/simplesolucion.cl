{% extends 'base.html' %}
{% block title %}Crear cuenta · Simple Solución{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:48px auto;text-align:center;">
  <img src="{{ url_for('static', filename='logo.svg') }}" alt="Simple Solución" style="width:64px;height:64px;border-radius:16px;box-shadow:0 4px 16px rgba(13,71,161,.25);">
  <h1 style="font-size:22px;margin:16px 0 20px;">Crear cuenta</h1>
  <form method="POST" style="text-align:left;">
    <label>Nombre</label>
    <input type="text" name="nombre">
    <label>Correo electrónico</label>
    <input type="email" name="email" required>
    <label>Contraseña</label>
    <input type="password" name="password" required minlength="6">
    <button type="submit" style="width:100%;">Crear cuenta</button>
  </form>
  <p style="margin-top:18px;font-size:14px;color:var(--texto-sec);">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" style="color:var(--azul);font-weight:600;text-decoration:none;">Inicia sesión</a></p>
</div>
{% endblock %}
