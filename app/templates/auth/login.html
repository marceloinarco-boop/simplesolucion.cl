{% extends 'base.html' %}
{% block title %}Iniciar sesión · Simple Solución{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:48px auto;text-align:center;">
  <img src="{{ url_for('static', filename='logo.svg') }}" alt="Simple Solución" style="width:64px;height:64px;border-radius:16px;box-shadow:0 4px 16px rgba(13,71,161,.25);">
  <h1 style="font-size:22px;margin:16px 0 2px;">Simple Solución</h1>
  <p style="color:var(--texto-sec);font-size:14px;margin-bottom:20px;">Ingresa a tu panel de herramientas</p>

  {% if google_disponible %}
  <a href="{{ url_for('auth.login_google') }}" class="btn" style="background:#fff;color:#3c4043;border:1.5px solid var(--borde);width:100%;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;gap:10px;">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34 5.1 29.3 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.4-.1-2.7-.4-4.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34 5.1 29.3 3 24 3 16.3 3 9.7 7.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 36.4 26.7 37 24 37c-5.3 0-9.7-3.4-11.3-8.1l-6.5 5C9.6 40.6 16.3 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.2 5.2C40.9 36.3 45 30.6 45 24c0-1.4-.1-2.7-.4-3.5z"/></svg>
    Continuar con Google
  </a>
  <p style="text-align:center;color:#a0a8b8;margin:16px 0;font-size:13px;">— o con tu correo —</p>
  {% endif %}

  <form method="POST" style="text-align:left;">
    <label>Correo electrónico</label>
    <input type="email" name="email" required>
    <label>Contraseña</label>
    <input type="password" name="password" required>
    <button type="submit" style="width:100%;">Entrar</button>
  </form>
  <p style="margin-top:18px;font-size:14px;color:var(--texto-sec);">¿No tienes cuenta? <a href="{{ url_for('auth.registro') }}" style="color:var(--azul);font-weight:600;text-decoration:none;">Regístrate</a></p>
</div>
{% endblock %}
