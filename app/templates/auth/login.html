{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="card" style="max-width:380px;margin:40px auto;">
  <div style="text-align:center;margin-bottom:10px;">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Simple Solución" style="width:90px;height:90px;border-radius:14px;object-fit:cover;">
  </div>
  <h2 style="text-align:center;">Iniciar sesión</h2>

  {% if google_disponible %}
  <a href="{{ url_for('auth.login_google') }}" class="btn" style="background:#fff;color:#444;border:1px solid #ccc;width:100%;text-align:center;">
    Continuar con Google
  </a>
  <p style="text-align:center;color:#999;margin:14px 0;">— o con tu correo —</p>
  {% endif %}

  <form method="POST">
    <label>Correo electrónico</label>
    <input type="email" name="email" required>
    <label>Contraseña</label>
    <input type="password" name="password" required>
    <button type="submit" style="width:100%;">Entrar</button>
  </form>
  <p style="margin-top:16px;font-size:14px;">¿No tienes cuenta? <a href="{{ url_for('auth.registro') }}">Regístrate</a></p>
</div>
{% endblock %}
